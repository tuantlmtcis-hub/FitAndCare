app = "fitandcare-web"
primary_region = "sin"

[build]

[[services]]
  internal_port = 8080
  protocol      = "tcp"
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [[services.ports]]
    handlers    = ["http"]
    port        = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port     = 443

  [services.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
